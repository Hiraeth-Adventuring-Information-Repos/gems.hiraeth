<!doctype html>
<html lang="en" data-mode="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemstone Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/themes.css">
  </head>
  <body data-page="tracker">
    <div class="page-shell tracker-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">D&D Campaign Utility</p>
          <h1 id="campaign-name">Gemstone Tracker</h1>
          <p class="subhead">
            Last updated:
            <time id="updated-at" datetime="">-</time>
          </p>
        </div>
        <div class="header-actions">
          <div id="color-mode-control" class="mode-toggle" role="group" aria-label="Color mode">
            <button type="button" class="mode-button" data-mode="auto" aria-pressed="true">Auto</button>
            <button type="button" class="mode-button" data-mode="light" aria-pressed="false">Light</button>
            <button type="button" class="mode-button" data-mode="dark" aria-pressed="false">Dark</button>
          </div>
          <a class="btn-link" href="./rules.html">Open Gem Rules</a>
        </div>
      </header>

      <section id="global-error" class="panel panel-error hidden" role="alert" aria-live="assertive">
        <h2>Data Load Error</h2>
        <p id="global-error-message"></p>
      </section>

      <section id="global-issues" class="panel panel-warning hidden" aria-live="polite">
        <h2>Data Warnings</h2>
        <ul id="global-issues-list"></ul>
      </section>

      <main>
        <section>
          <div class="section-header">
            <h2>Player Inventory</h2>
          </div>
          <div id="player-grid" class="player-grid" aria-live="polite"></div>
        </section>
        <section id="history-summary"></section>
      </main>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
